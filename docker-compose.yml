    ports:
      - "8003:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - RESEND_API_KEY=${RESEND_API_KEY}
    volumes:
      - ./backend/shared:/app/shared
    restart: unless-stopped

  module4-vision:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        MODULE: module4_vision
    ports:
      - "8004:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
    volumes:
      - ./backend/shared:/app/shared
    restart: unless-stopped

  module5-career:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        MODULE: module5_career
    ports:
      - "8005:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
    volumes:
      - ./backend/shared:/app/shared
    restart: unless-stopped
